server {
    listen 80;
    server_name 147.93.55.221;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options "nosniff";
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload";

    location / {
        try_files $uri $uri/ /index.html;
    }

    error_log /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;

    location ~* \.(?:css|js|woff2|woff|ttf|eot|svg|otf|png|jpg|jpeg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public";
    }

    # 🔒 Bloquer les requêtes vers des domaines suspects
    location ~* reasonlabsapi {
        return 444; # Fermer la connexion silencieusement
        access_log off;
    }

    # Content Security Policy pour bloquer les scripts externes non autorisés
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://fonts.googleapis.com;" always;
}
