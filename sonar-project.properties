# SonarQube Project Configuration for Frontend
sonar.projectKey=inventaire-module-wms-front
sonar.projectName=InventaireModuleWMSFront
sonar.projectVersion=1.0

# Source code location
sonar.sources=src
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.spec.ts,**/*.test.ts,**/coverage/**,**/*.d.ts

# TypeScript and Vue configuration
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Language settings
sonar.sourceEncoding=UTF-8

# Vue specific settings
sonar.lang.patterns.vue=**/*.vue
sonar.lang.patterns.ts=**/*.ts
sonar.lang.patterns.js=**/*.js

# Test exclusions
sonar.coverage.exclusions=**/*.spec.ts,**/*.test.ts,**/tests/**
sonar.test.exclusions=**/*.spec.ts,**/*.test.ts,**/tests/**

# Additional exclusions for generated files
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/*.d.ts,**/vite.config.ts,**/tailwind.config.cjs,**/postcss.config.cjs